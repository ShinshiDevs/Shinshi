[tool.poetry]
name = "shinshi"
version = "0.1.0"
description = "Shinshi is a modern and user-friendly Discord bot designed to provide you and your servers with great features and stable performance."
authors = ["stefanlight <64615032+stefanlight8@users.noreply.github.com>"]
license = "GPL-3.0"
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.10,<3.13"

colorlog = "^6.8.2"
orjson = "^3.10.0"
hikari = { version = "^2.0.0.dev124", extras = ["speedups"] }

cachetools = "^5.3.3"
types-cachetools = "^5.3.0.7"




[tool.poetry.group.dev.dependencies]
memray = "^1.12.0"
mypy = "^1.9.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
