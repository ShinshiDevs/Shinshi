[tool.poetry]
name = "shinshi-alterstein"
version = "1.0.0"
description = "Shinshi is a modern and user-friendly Discord bot designed to give you and your servers great functionality and stable performance."
authors = ["stefanlight"]
maintainers = ["stefanlight", "theroer"]
readme = "README.md"
license = "GPL-3.0"

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
cachetools = "^5.3.2"
uvloop = "^0.19.0"
pyyaml = "^6.0.1"
orjson = "^3.9.15"


[tool.poetry.group.dev.dependencies]
memray = "^1.11.0"


[tool.poetry.group.discord.dependencies]
hikari = { version = "^2.0.0.dev122", extras = ["speedups"] }

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
